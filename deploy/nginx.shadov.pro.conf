# /etc/nginx/sites-available/shadov.pro
# После создания: sudo ln -s /etc/nginx/sites-available/shadov.pro /etc/nginx/sites-enabled/
# Затем: sudo certbot --nginx -d shadov.pro -d www.shadov.pro

# www -> non-www redirect
server {
    listen 80;
    listen [::]:80;
    server_name www.shadov.pro;
    return 301 https://shadov.pro$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name shadov.pro;

    # certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # после выдачи SSL certbot сам подменит на https redirect
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}

